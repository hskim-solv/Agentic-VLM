id: rag_quality_axes
name: RAG quality/cost ablation axes
description: Compare metadata-first retrieval, reranking, verifier retry, and hierarchical evidence assembly.
baseline_run: no_verifier_retry
primary_run: full
runs:
  - name: full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: hierarchical
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: hierarchical
  - name: no_metadata_first
    metadata_first: false
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: no_rerank
    metadata_first: true
    rerank: false
    verifier_retry: true
    retrieval_mode: flat
  - name: no_verifier_retry
    metadata_first: true
    rerank: true
    verifier_retry: false
    retrieval_mode: flat
