<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  // GitHub Pagesмқҳ kramdownмқҖ ```mermaid лё”лЎқмқ„ <pre><code class="language-mermaid">лЎң м¶ңл Ҙн•ңлӢӨ.
  // mermaid.run()мқ„ querySelectorлЎң м§Ғм ‘ нҳём¶ңн•ҙ <pre>/<code>лҘј mermaidк°Җ мқёмӢқн•ҳлҸ„лЎқ м •к·ңнҷ”н•ңлӢӨ.
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll('pre > code.language-mermaid').forEach(function (block) {
      var pre = block.parentNode;
      var wrapper = document.createElement('div');
      wrapper.className = 'mermaid';
      wrapper.textContent = block.textContent;
      pre.parentNode.replaceChild(wrapper, pre);
    });
    if (window.mermaid) {
      window.mermaid.initialize({ startOnLoad: false, theme: 'default' });
      window.mermaid.run();
    }
  });
</script>

  /* лё”лЎңк·ё ліёл¬ё к°ҖлҸ…м„ұ ліҙк°• */
